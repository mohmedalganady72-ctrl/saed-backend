name: CI/CD Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/saed_app_api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/saed_app_api:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Show pushed image tags
        run: |
          echo "Pushed image: ${{ secrets.DOCKERHUB_USERNAME }}/saed_app_api:latest"
          echo "Pushed image: ${{ secrets.DOCKERHUB_USERNAME }}/saed_app_api:${{ github.sha }}"
