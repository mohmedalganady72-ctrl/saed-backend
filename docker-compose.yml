version: '3.9'
services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./public:/var/www/html/public
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: saeddb
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: change-this-secret-in-production
      APP_DEBUG: true
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saeddb
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
